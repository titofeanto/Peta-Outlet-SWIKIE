<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Monitor Pengantaran</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0E2A3E;--ink-2:#173B54;--surface:#F5F6F3;--surface-2:#FFFFFF;--line:#DEE3DF;--muted:#5E6E71;--go:#1F8A4C;--go-dark:#186B3B;--live:#FF8A1E;--danger:#C64B3C;--radius:14px;--font-display:'Space Grotesk',system-ui,sans-serif;--font-body:'Inter',system-ui,-apple-system,sans-serif;}
*{box-sizing:border-box;}body{margin:0;font-family:var(--font-body);background:var(--surface);color:var(--ink);}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px 80px;}
header h1{font-family:var(--font-display);font-size:20px;margin:0 0 4px;}header p{margin:0;color:var(--muted);font-size:13px;}
.card{background:var(--surface-2);border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:0 2px 10px rgba(14,42,62,0.08);}
.card h2{font-family:var(--font-display);font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;}
.stat{background:var(--surface);border-radius:12px;padding:14px;text-align:center;}
.stat .num{font-family:var(--font-display);font-weight:700;font-size:28px;}.stat .lbl{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;}
.stat.green .num{color:var(--go);}.stat.orange .num{color:var(--live);}.stat.blue .num{color:var(--ink-2);}
.prog-bar{height:10px;border-radius:5px;background:var(--surface);overflow:hidden;margin:8px 0;}
.prog-fill{height:100%;border-radius:5px;background:var(--go);transition:width .4s;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{text-align:left;color:var(--muted);font-weight:700;font-size:11px;padding:6px 8px;border-bottom:1.5px solid var(--line);position:sticky;top:0;background:var(--surface-2);}
td{padding:8px;border-bottom:1px solid var(--surface);vertical-align:middle;}
td.num{text-align:right;font-variant-numeric:tabular-nums;}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;}
.tag-done{background:#EAF7EE;color:var(--go-dark);}.tag-pending{background:#FDF3E7;color:#8A5A16;}
.tag-veh{color:#fff;font-size:9px;padding:2px 6px;}
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.filter-row select{appearance:none;-webkit-appearance:none;border:1.5px solid var(--line);border-radius:9px;padding:8px 28px 8px 10px;font-size:13px;font-family:var(--font-body);background:var(--surface-2) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%235E6E71'/></svg>") no-repeat right 10px center;outline:none;}
.btn{border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:var(--font-body);}
.btn-outline{background:var(--surface);color:var(--ink-2);border:1.5px solid var(--line);}
.empty{color:var(--muted);text-align:center;padding:30px;font-size:13px;}
.hint{font-size:11.5px;color:var(--muted);line-height:1.5;}
.refresh-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.refresh-row .ts{font-size:11px;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
<header><h1>📊 Dashboard Monitor Pengantaran</h1><p>Status pengiriman real-time berdasarkan rencana & laporan driver.</p></header>

<div class="card">
<div class="refresh-row">
<button class="btn btn-outline" id="refreshBtn">🔄 Refresh Data</button>
<span class="ts" id="lastRefresh"></span>
</div>
<div class="stats" id="statsArea"><div class="empty">Memuat data…</div></div>
<div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
<div class="hint" id="progHint" style="text-align:center;"></div>
</div>

<div class="card">
<h2>Per Kendaraan</h2>
<div id="perVehicle"></div>
</div>

<div class="card">
<h2>Detail Invoice</h2>
<div class="filter-row">
<select id="fStatus"><option value="">Semua Status</option><option value="done">Terkirim</option><option value="pending">Belum</option></select>
<select id="fVehicle"><option value="">Semua Kendaraan</option></select>
</div>
<div style="overflow-x:auto;max-height:500px;overflow-y:auto;">
<table><thead><tr><th>Outlet</th><th>No Invoice</th><th class="num">Nilai</th><th>Kendaraan</th><th>Status</th><th>Waktu Kirim</th><th>Lokasi Aktual</th></tr></thead>
<tbody id="detailBody"></tbody></table>
</div>
<div class="empty" id="detailEmpty" style="display:none;">Tidak ada data.</div>
</div>

<div class="card">
<button class="btn btn-outline" id="exportCsvBtn">⬇ Unduh Rekap CSV</button>
</div>
</div>

<script>
let RENCANA=null,DELIVERIES={},OUTLETS=[],outletByCc={};
let ghCreds=null;

function parseHash(){const h=location.hash.slice(1);if(!h)return;const p=new URLSearchParams(h);const t=p.get('t'),o=p.get('o'),r=p.get('r');if(t&&o&&r)ghCreds={token:t,owner:o,repo:r};}
parseHash();

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtRp(n){return'Rp '+Number(n).toLocaleString('id-ID');}
function deliveryKey(cc,invNo){return cc+'|'+(invNo||'');}

async function loadData(){
  try{const r=await fetch('./outlets.json',{cache:'no-store'});OUTLETS=await r.json();OUTLETS.forEach(o=>{outletByCc[o.cc]=o;});}catch(e){}
  try{const r2=await fetch('./rencana.json',{cache:'no-store'});if(r2.ok)RENCANA=await r2.json();}catch(e){}
  try{const r3=await fetch('./deliveries.json',{cache:'no-store'});if(r3.ok){const d=await r3.json();DELIVERIES=d.reports||{};}}catch(e){}
  document.getElementById('lastRefresh').textContent='Terakhir: '+new Date().toLocaleString('id-ID');
  render();
}

function render(){
  if(!RENCANA||!RENCANA.vehicles){document.getElementById('statsArea').innerHTML='<div class="empty">Rencana belum tersedia. Publikasikan dari admin.html.</div>';return;}
  const allStops=[];
  RENCANA.vehicles.forEach(v=>(v.stops||[]).forEach(s=>allStops.push({...s,vehicleId:v.id,vehicleName:v.name,vehicleHex:v.hex||'#555'})));
  const totalStops=allStops.length;
  const delivered=allStops.filter(s=>DELIVERIES[deliveryKey(s.cc,s.invoiceNo)]);
  const pending=totalStops-delivered.length;
  const totalValue=allStops.reduce((s,x)=>s+x.invoice,0);
  const deliveredValue=delivered.reduce((s,x)=>s+x.invoice,0);
  const pct=totalStops?Math.round(delivered.length/totalStops*100):0;

  document.getElementById('statsArea').innerHTML=
    '<div class="stat blue"><div class="num">'+totalStops+'</div><div class="lbl">Total Invoice</div></div>'+
    '<div class="stat green"><div class="num">'+delivered.length+'</div><div class="lbl">Terkirim</div></div>'+
    '<div class="stat orange"><div class="num">'+pending+'</div><div class="lbl">Belum Terkirim</div></div>'+
    '<div class="stat"><div class="num">'+pct+'%</div><div class="lbl">Progress</div></div>';
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progHint').textContent='Terkirim: '+fmtRp(deliveredValue)+' dari '+fmtRp(totalValue)+' · Rencana: '+RENCANA.tanggal_rencana;

  // Per vehicle
  const pvHtml=RENCANA.vehicles.map(v=>{
    const stops=v.stops||[];const done=stops.filter(s=>DELIVERIES[deliveryKey(s.cc,s.invoiceNo)]).length;
    const vpct=stops.length?Math.round(done/stops.length*100):0;
    return'<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:700;font-size:13px;">'+escapeHtml(v.name)+'</span><span style="font-size:12px;color:var(--muted);">'+done+'/'+stops.length+' ('+vpct+'%)</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+vpct+'%;background:'+(v.hex||'var(--go)')+'"></div></div></div>';
  }).join('');
  document.getElementById('perVehicle').innerHTML=pvHtml;

  // Vehicle filter
  const fVehicle=document.getElementById('fVehicle');
  const prevVal=fVehicle.value;
  fVehicle.innerHTML='<option value="">Semua Kendaraan</option>'+RENCANA.vehicles.map(v=>'<option value="'+v.id+'">'+escapeHtml(v.name)+'</option>').join('');
  fVehicle.value=prevVal;

  renderDetail(allStops);
}

function renderDetail(allStops){
  const fStatus=document.getElementById('fStatus').value;
  const fVehicle=document.getElementById('fVehicle').value;
  let filtered=allStops;
  if(fVehicle)filtered=filtered.filter(s=>s.vehicleId===fVehicle);
  if(fStatus==='done')filtered=filtered.filter(s=>DELIVERIES[deliveryKey(s.cc,s.invoiceNo)]);
  if(fStatus==='pending')filtered=filtered.filter(s=>!DELIVERIES[deliveryKey(s.cc,s.invoiceNo)]);

  document.getElementById('detailEmpty').style.display=filtered.length?'none':'block';
  const body=document.getElementById('detailBody');
  body.innerHTML=filtered.map(s=>{
    const outlet=outletByCc[s.cc];const name=outlet?outlet.n:s.cc;
    const dk=deliveryKey(s.cc,s.invoiceNo);const del=DELIVERIES[dk];
    const statusTag=del?'<span class="tag tag-done">Terkirim</span>':'<span class="tag tag-pending">Belum</span>';
    const timeStr=del?new Date(del.delivered_at).toLocaleString('id-ID'):'-';
    const locStr=del?'<a href="https://www.google.com/maps?q='+del.lat+','+del.lon+'" target="_blank" style="color:var(--ink-2);font-size:11px;">📍 Lihat</a>':'-';
    return'<tr><td>'+escapeHtml(name)+'<div style="color:var(--muted);font-size:10px;">'+s.cc+'</div></td><td>'+escapeHtml(s.invoiceNo||'-')+'</td><td class="num">'+fmtRp(s.invoice)+'</td><td><span class="tag tag-veh" style="background:'+(s.vehicleHex||'#555')+'">'+escapeHtml(s.vehicleName)+'</span></td><td>'+statusTag+'</td><td style="font-size:11px;">'+timeStr+'</td><td>'+locStr+'</td></tr>';
  }).join('');
}

document.getElementById('fStatus').addEventListener('change',()=>{if(RENCANA)render();});
document.getElementById('fVehicle').addEventListener('change',()=>{if(RENCANA)render();});
document.getElementById('refreshBtn').addEventListener('click',loadData);

// Export CSV
document.getElementById('exportCsvBtn').addEventListener('click',()=>{
  if(!RENCANA)return;
  let csv='Kode Outlet,Nama Outlet,No Invoice,Nilai Invoice,Kendaraan,Status,Waktu Kirim,Lat Aktual,Lon Aktual\n';
  RENCANA.vehicles.forEach(v=>(v.stops||[]).forEach(s=>{
    const outlet=outletByCc[s.cc];const name=outlet?outlet.n:s.cc;
    const dk=deliveryKey(s.cc,s.invoiceNo);const del=DELIVERIES[dk];
    csv+=[s.cc,'"'+name.replace(/"/g,'""')+'"',s.invoiceNo||'',s.invoice,v.name,del?'Terkirim':'Belum',del?del.delivered_at:'',del?del.lat:'',del?del.lon:''].join(',')+'\n';
  }));
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='rekap_pengantaran_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
});

loadData();
</script>
</body>
</html>
