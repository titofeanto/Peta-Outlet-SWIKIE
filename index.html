<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Peta Outlet Swikie</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E2A3E;
  --ink-2:#173B54;
  --surface:#F5F6F3;
  --surface-2:#FFFFFF;
  --line:#DEE3DF;
  --muted:#5E6E71;
  --go:#1F8A4C;
  --go-dark:#186B3B;
  --live:#FF8A1E;
  --live-2:#FFB020;
  --danger:#C64B3C;
  --radius:14px;
  --font-display:'Space Grotesk', system-ui, sans-serif;
  --font-body:'Inter', system-ui, -apple-system, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;font-family:var(--font-body);background:var(--surface);color:var(--ink);}
#app{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;}
#map{position:absolute;inset:0;background:#DCE4DE;}

/* ---------- Top bar ---------- */
#topbar{
  position:absolute;top:0;left:0;right:0;z-index:1000;
  padding:calc(10px + env(safe-area-inset-top)) 10px 8px;
  background:linear-gradient(180deg, rgba(14,42,62,0.92) 0%, rgba(14,42,62,0.0) 100%);
  pointer-events:none;
}
#topbar .inner{pointer-events:auto;}
.brand-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px;}
.brand-dot{width:9px;height:9px;border-radius:50%;background:var(--live-2);box-shadow:0 0 0 3px rgba(255,176,32,0.25);}
.brand-title{font-family:var(--font-display);font-weight:700;font-size:15px;color:#fff;letter-spacing:0.2px;}
.brand-count{margin-left:auto;font-size:12px;color:#CFE0EA;background:rgba(255,255,255,0.12);padding:3px 9px;border-radius:20px;font-weight:600;}

.search-wrap{
  display:flex;align-items:center;gap:8px;background:var(--surface-2);
  border-radius:var(--radius);padding:9px 12px;box-shadow:0 3px 14px rgba(14,42,62,0.22);
}
.search-wrap svg{flex:none;opacity:0.55;}
#searchInput{border:none;outline:none;flex:1;font-size:15px;font-family:var(--font-body);background:transparent;color:var(--ink);}
#searchInput::placeholder{color:#9AA6A2;}
#clearSearch{display:none;border:none;background:#EEF1EE;color:var(--muted);width:22px;height:22px;border-radius:50%;font-size:13px;cursor:pointer;flex:none;line-height:1;}

.mode-row{display:flex;gap:8px;margin-top:8px;}
.mode-btn{flex:1;text-align:center;padding:8px 6px;border-radius:20px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.16);color:#fff;}
.mode-btn.active{background:var(--surface-2);color:var(--ink-2);}
.vehicle-row{display:none;gap:8px;margin-top:8px;overflow-x:auto;scrollbar-width:none;}
.vehicle-row.show{display:flex;}
.vehicle-row::-webkit-scrollbar{display:none;}
.vchip{flex:none;padding:7px 13px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;opacity:0.55;border:2px solid transparent;}
.vchip.active{opacity:1;border-color:#fff;}
.filter-row{display:flex;gap:8px;margin-top:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
select.chip{
  appearance:none;-webkit-appearance:none;border:none;border-radius:20px;
  padding:7px 26px 7px 13px;font-size:12.5px;font-weight:600;color:var(--ink-2);
  background-color:var(--surface-2);background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%235E6E71'/></svg>");
  background-repeat:no-repeat;background-position:right 10px center;
  box-shadow:0 2px 8px rgba(14,42,62,0.16);white-space:nowrap;flex:none;
}
select.chip.active{background-color:var(--ink-2);color:#fff;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%23fff'/></svg>");}

/* ---------- Locate / follow button ---------- */
#locateBtn{
  position:absolute;right:12px;z-index:1000;
  width:46px;height:46px;border-radius:50%;border:none;
  background:var(--surface-2);box-shadow:0 3px 12px rgba(14,42,62,0.3);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .15s, transform .1s;
}
#locateBtn:active{transform:scale(0.94);}
#locateBtn.following{background:var(--ink-2);}
#locateBtn.following svg path, #locateBtn.following svg circle{stroke:#fff;}
#gpsStatus{
  position:absolute;left:12px;z-index:1000;
  background:var(--surface-2);border-radius:20px;padding:6px 12px 6px 10px;
  font-size:11.5px;font-weight:600;color:var(--muted);box-shadow:0 3px 10px rgba(14,42,62,0.18);
  display:flex;align-items:center;gap:6px;max-width:150px;
}
#gpsStatus .dot{width:7px;height:7px;border-radius:50%;background:var(--danger);flex:none;}
#gpsStatus.ok .dot{background:var(--go);}
#gpsStatus.wait .dot{background:var(--live-2);animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0.3;}}

/* ---------- Bottom sheet ---------- */
#sheet{
  position:absolute;left:0;right:0;bottom:0;z-index:1000;
  background:var(--surface-2);border-radius:20px 20px 0 0;
  box-shadow:0 -6px 24px rgba(14,42,62,0.25);
  display:flex;flex-direction:column;
  transform:translateY(calc(100% - 96px));
  transition:transform .28s cubic-bezier(.2,.8,.3,1);
  max-height:78vh;touch-action:none;
}
#sheet.open{transform:translateY(0);}
#sheetHandle{padding:10px 0 6px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;flex:none;}
#sheetHandle .bar{width:38px;height:4px;border-radius:3px;background:var(--line);}
#sheetSummary{display:flex;align-items:center;justify-content:space-between;width:100%;padding:0 18px;}
#sheetSummary .label{font-family:var(--font-display);font-weight:700;font-size:14.5px;color:var(--ink);}
#sheetSummary .sub{font-size:12px;color:var(--muted);}
#sheetList{overflow-y:auto;padding:2px 10px 20px;flex:1;-webkit-overflow-scrolling:touch;}
.outlet-row{
  display:flex;align-items:center;gap:11px;padding:11px 8px;border-bottom:1px solid var(--surface);
  cursor:pointer;
}
.outlet-row:active{background:var(--surface);}
.outlet-idx{
  flex:none;width:34px;height:34px;border-radius:10px;background:var(--surface);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);
  font-weight:700;font-size:12px;color:var(--ink-2);
}
.outlet-info{flex:1;min-width:0;}
.outlet-name{font-weight:700;font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.outlet-meta{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.outlet-dist{flex:none;font-size:11px;font-weight:700;color:var(--go-dark);text-align:right;min-width:44px;}
.outlet-go{
  flex:none;width:34px;height:34px;border-radius:50%;background:var(--go);
  display:flex;align-items:center;justify-content:center;
}
#emptyState{padding:30px 20px;text-align:center;color:var(--muted);font-size:13px;display:none;}

/* ---------- Popup styling ---------- */
.leaflet-popup-content-wrapper{border-radius:14px;padding:0;overflow:hidden;}
.leaflet-popup-content{margin:0;width:220px !important;}
.pop-body{padding:13px 14px 12px;}
.pop-name{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--ink);margin-bottom:3px;}
.pop-addr{font-size:11.5px;color:var(--muted);margin-bottom:2px;}
.pop-tags{display:flex;gap:5px;margin:7px 0 10px;flex-wrap:wrap;}
.pop-tag{font-size:10px;font-weight:700;background:var(--surface);color:var(--ink-2);padding:3px 8px;border-radius:20px;}
.pop-nav{
  display:flex;align-items:center;justify-content:center;gap:6px;
  background:var(--go);color:#fff;text-decoration:none;font-weight:700;font-size:12.5px;
  padding:9px 0;border-radius:9px;
}
.leaflet-popup-tip{display:none;}
.leaflet-popup-close-button{color:#fff !important;top:8px !important;right:8px !important;}

.marker-outlet{
  width:26px;height:26px;border-radius:50% 50% 50% 0;background:var(--ink-2);
  transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,0.35);
}
.marker-outlet.dim{background:#9AAAB4;}
.marker-outlet.v1{background:#1F77B4;}
.marker-outlet.v2{background:#E07B39;}
.marker-outlet.v3{background:#2E9E56;}
.marker-outlet.v4{background:#B03A5B;}
.live-marker{width:22px;height:22px;position:relative;}
.live-marker .pulse{position:absolute;inset:-14px;border-radius:50%;background:rgba(255,138,30,0.35);animation:pulse 1.8s ease-out infinite;}
.live-marker .core{position:absolute;inset:0;border-radius:50%;background:var(--live);border:3px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,0.15);}
@keyframes pulse{0%{transform:scale(0.3);opacity:0.9;}100%{transform:scale(1.6);opacity:0;}}

.marker-cluster-custom{
  background:var(--ink-2);color:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:12.5px;
  border:3px solid rgba(255,255,255,0.85);box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* ---------- Toast ---------- */
#toast{
  position:absolute;left:50%;top:calc(14px + env(safe-area-inset-top));transform:translateX(-50%) translateY(-60px);
  background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:12.5px;font-weight:600;
  z-index:2000;box-shadow:0 4px 16px rgba(0,0,0,0.3);transition:transform .25s ease;max-width:86%;text-align:center;
}
#toast.show{transform:translateX(-50%) translateY(0);}

.route-fab{
  position:absolute;left:12px;right:12px;z-index:1000;bottom:112px;
  background:var(--go);color:#fff;border:none;border-radius:12px;padding:12px 14px;
  font-weight:700;font-size:13.5px;display:none;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(31,138,76,0.4);cursor:pointer;
}
.route-fab.show{display:flex;}
@media (min-width:720px){.route-fab{max-width:420px;}}

@media (min-width:720px){
  #topbar{padding-left:16px;padding-right:16px;}
  .inner{max-width:420px;}
  #sheet{max-width:420px;left:16px;right:auto;border-radius:20px;bottom:16px;box-shadow:0 8px 30px rgba(14,42,62,0.3);}
  #sheet.open{transform:translateY(0);}
  #locateBtn{right:16px !important;}
}
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>

  <div id="topbar">
    <div class="inner">
      <div class="brand-row">
        <div class="brand-dot"></div>
        <div class="brand-title">Peta Outlet Swikie</div>
        <div class="brand-count" id="countBadge">657 outlet</div>
      </div>
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#5E6E71" stroke-width="2"/><path d="M20 20l-3.5-3.5" stroke="#5E6E71" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="searchInput" type="text" placeholder="Cari nama outlet / alamat…" autocomplete="off">
        <button id="clearSearch">✕</button>
      </div>
      <div class="mode-row" id="modeRow" style="display:none;">
        <button class="mode-btn active" id="modeAll">Semua Outlet</button>
        <button class="mode-btn" id="modePlan">Rencana Pengantaran</button>
      </div>
      <div class="filter-row" id="filterRow">
        <select id="filterTown" class="chip"><option value="">Semua Wilayah</option></select>
        <select id="filterSalesman" class="chip"><option value="">Semua Salesman</option></select>
        <select id="filterDay" class="chip"><option value="">Semua Hari PJP</option></select>
      </div>
      <div class="vehicle-row" id="vehicleRow">
        <div class="vchip active" data-v="all" style="background:#0E2A3E;">Semua Mobil</div>
        <div class="vchip" data-v="1" style="background:#1F77B4;">Mobil 1</div>
        <div class="vchip" data-v="2" style="background:#E07B39;">Mobil 2</div>
        <div class="vchip" data-v="3" style="background:#2E9E56;">Mobil 3</div>
        <div class="vchip" data-v="4" style="background:#B03A5B;">Mobil 4</div>
      </div>
    </div>
  </div>

  <div id="gpsStatus" class="wait" style="bottom:112px;"><div class="dot"></div><span id="gpsText">Mencari GPS…</span></div>
  <button id="locateBtn" style="bottom:112px;" title="Ikuti lokasi saya">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="#0E2A3E" stroke-width="2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="#0E2A3E" stroke-width="2" stroke-linecap="round"/></svg>
  </button>

  <button class="route-fab" id="routeFab">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2l9 20-9-6-9 6 9-20z" fill="#fff"/></svg>
    <span id="routeFabText">Buka Rute di Google Maps</span>
  </button>

  <div id="sheet">
    <div id="sheetHandle">
      <div class="bar"></div>
      <div id="sheetSummary">
        <div>
          <div class="label" id="sheetLabel">657 outlet ditemukan</div>
          <div class="sub" id="sheetSub">Diurutkan berdasarkan jarak terdekat</div>
        </div>
        <svg id="sheetChevron" width="18" height="18" viewBox="0 0 24 24" fill="none" style="transition:transform .25s;"><path d="M6 9l6 6 6-6" stroke="#5E6E71" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
    <div id="sheetList"></div>
    <div id="emptyState">Tidak ada outlet yang cocok dengan pencarian/filter ini.</div>
  </div>

  <div id="toast"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
/* ============ Global state ============ */
let OUTLETS = [];
let RENCANA = null;
let outletByCc = {};
let currentMode = 'all';
let currentVehicle = 'all';
let routeChunks = [];
let routeChunkIndex = 0;
let map, clusterGroup, markers = {};

/* ============ Boot: fetch data first ============ */
async function boot(){
  try{
    const r = await fetch('./outlets.json', {cache:'no-store'});
    if(!r.ok) throw new Error('missing');
    OUTLETS = await r.json();
  }catch(e){
    document.getElementById('gpsText').textContent = 'Data outlet gagal dimuat';
    showToast('Gagal memuat outlets.json — pastikan file ini ada di folder yang sama dengan index.html.');
    return;
  }
  try{
    const r2 = await fetch('./rencana.json', {cache:'no-store'});
    if(r2.ok) RENCANA = await r2.json();
  }catch(e){ /* rencana optional, ignore */ }
  initApp();
}

/* ============ App init (runs once data is ready) ============ */
function initApp(){
  OUTLETS.forEach((o,i)=>{ o.id=i; outletByCc[o.cc]=o; });

  map = L.map('map', {zoomControl:false, attributionControl:true}).setView([-1.0, 131.15], 9);
  L.control.attribution({position:'bottomright', prefix:false}).addAttribution('© OpenStreetMap');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);

  clusterGroup = L.markerClusterGroup({
    maxClusterRadius:55,
    iconCreateFunction: function(cluster){
      const count = cluster.getChildCount();
      const sz = count>50?46:count>15?40:34;
      return L.divIcon({html:'<div class="marker-cluster-custom" style="width:'+sz+'px;height:'+sz+'px;">'+count+'</div>', className:'', iconSize:null});
    }
  });

  OUTLETS.forEach(o=>{
    const m = L.marker([o.lat, o.lon], {icon:outletIcon()});
    m.bindPopup(popupHtml(o));
    m.outletId = o.id;
    markers[o.id] = m;
  });
  map.addLayer(clusterGroup);

  setupFilters();
  setupModeAndVehicles();
  setupSheet();
  setupGPS();
  setupRouteFab();

  if(RENCANA && RENCANA.vehicles && RENCANA.vehicles.length){
    document.getElementById('modeRow').style.display = 'flex';
  }

  applyFilters();
}

/* ============ Icons & popups ============ */
function outletIcon(){
  return L.divIcon({className:'', html:'<div class="marker-outlet"></div>', iconSize:[26,26], iconAnchor:[13,26], popupAnchor:[0,-24]});
}
function vehicleIcon(vId){
  return L.divIcon({className:'', html:'<div class="marker-outlet v'+vId+'"></div>', iconSize:[26,26], iconAnchor:[13,26], popupAnchor:[0,-24]});
}
function gmapsUrl(lat, lon){
  return 'https://www.google.com/maps/dir/?api=1&destination='+lat+','+lon+'&travelmode=driving';
}
function fmtRp(n){ return 'Rp ' + Number(n).toLocaleString('id-ID'); }
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function popupHtml(o){
  const day = o.p ? o.p : '-';
  let tags = '<span class="pop-tag">'+escapeHtml(o.s||'-')+'</span><span class="pop-tag">'+escapeHtml(day)+'</span>';
  if(o._vehicleId){
    tags = '<span class="pop-tag" style="background:var(--v'+o._vehicleId+');color:#fff;">Mobil '+o._vehicleId+'</span>'
      + (o._invoice ? '<span class="pop-tag">'+fmtRp(o._invoice)+'</span>' : '');
  }
  return '<div class="pop-body">'
    +'<div class="pop-name">'+escapeHtml(o.n)+'</div>'
    +'<div class="pop-addr">'+escapeHtml(o.a||'-')+', '+escapeHtml(o.t)+'</div>'
    +'<div class="pop-tags">'+tags+'</div>'
    +'<a class="pop-nav" href="'+gmapsUrl(o.lat,o.lon)+'" target="_blank" rel="noopener">'
    +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2l9 20-9-6-9 6 9-20z" fill="#fff"/></svg> Navigasi ke sini</a>'
    +'</div>';
}

/* ============ Filters (Semua Outlet mode) ============ */
function uniqueSorted(arr){ return [...new Set(arr.filter(v=>v))].sort((a,b)=>a.localeCompare(b)); }
let townSel, salesSel, daySel, searchInput, clearSearchBtn;
const dayOrder = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

function setupFilters(){
  townSel = document.getElementById('filterTown');
  salesSel = document.getElementById('filterSalesman');
  daySel = document.getElementById('filterDay');
  searchInput = document.getElementById('searchInput');
  clearSearchBtn = document.getElementById('clearSearch');

  uniqueSorted(OUTLETS.map(o=>o.t)).forEach(t=>{
    const opt=document.createElement('option'); opt.value=t; opt.textContent=t; townSel.appendChild(opt);
  });
  uniqueSorted(OUTLETS.map(o=>o.s)).forEach(s=>{
    const opt=document.createElement('option'); opt.value=s; opt.textContent=s; salesSel.appendChild(opt);
  });
  uniqueSorted(OUTLETS.map(o=>o.p)).sort((a,b)=>dayOrder.indexOf(a)-dayOrder.indexOf(b)).forEach(d=>{
    const opt=document.createElement('option'); opt.value=d; opt.textContent=d; daySel.appendChild(opt);
  });
  [townSel, salesSel, daySel].forEach(sel=>{
    sel.addEventListener('change', ()=>{ sel.classList.toggle('active', !!sel.value); applyFilters(); });
  });
  searchInput.addEventListener('input', ()=>{
    clearSearchBtn.style.display = searchInput.value ? 'block' : 'none';
    applyFilters();
  });
  clearSearchBtn.addEventListener('click', ()=>{
    searchInput.value=''; clearSearchBtn.style.display='none'; applyFilters();
  });
}

/* ============ Mode toggle (Semua Outlet / Rencana Besok) ============ */
function setupModeAndVehicles(){
  document.getElementById('modeAll').addEventListener('click', ()=>setMode('all'));
  document.getElementById('modePlan').addEventListener('click', ()=>setMode('plan'));
  document.querySelectorAll('.vchip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      currentVehicle = chip.dataset.v;
      document.querySelectorAll('.vchip').forEach(c=>c.classList.toggle('active', c===chip));
      applyFilters();
    });
  });
}
function setMode(mode){
  if(mode==='plan' && (!RENCANA || !RENCANA.vehicles || !RENCANA.vehicles.length)){
    showToast('Rencana besok belum tersedia. Upload rencana.json terlebih dahulu.');
    return;
  }
  currentMode = mode;
  document.getElementById('modeAll').classList.toggle('active', mode==='all');
  document.getElementById('modePlan').classList.toggle('active', mode==='plan');
  document.getElementById('filterRow').style.display = mode==='all' ? 'flex' : 'none';
  document.getElementById('vehicleRow').classList.toggle('show', mode==='plan');
  currentVehicle = 'all';
  document.querySelectorAll('.vchip').forEach(c=>c.classList.toggle('active', c.dataset.v==='all'));
  applyFilters();
}

/* ============ Core filter/apply logic ============ */
let currentFiltered = [];

function applyFilters(){
  clusterGroup.clearLayers();

  if(currentMode==='plan' && RENCANA){
    let stopsAll = [];
    RENCANA.vehicles.forEach(v=>{
      if(currentVehicle!=='all' && String(v.id)!==String(currentVehicle)) return;
      v.stops.forEach(s=> stopsAll.push({cc:s.cc, invoice:s.invoice, vehicleId:v.id}));
    });
    const q = (searchInput.value||'').trim().toLowerCase();
    currentFiltered = stopsAll.map(s=>{
      const o = outletByCc[s.cc];
      if(!o) return null;
      return Object.assign({}, o, {_vehicleId:s.vehicleId, _invoice:s.invoice});
    }).filter(Boolean).filter(o=>{
      if(!q) return true;
      return (o.n||'').toLowerCase().includes(q) || (o.a||'').toLowerCase().includes(q);
    });
    currentFiltered.forEach(o=>{
      const m = markers[o.id];
      m.setIcon(vehicleIcon(o._vehicleId));
      m.setPopupContent(popupHtml(o));
      clusterGroup.addLayer(m);
    });
    document.getElementById('countBadge').textContent = currentFiltered.length + ' outlet (rencana)';
  } else {
    const q = searchInput.value.trim().toLowerCase();
    const town = townSel.value, sales = salesSel.value, day = daySel.value;
    currentFiltered = OUTLETS.filter(o=>{
      if(town && o.t!==town) return false;
      if(sales && o.s!==sales) return false;
      if(day && o.p!==day) return false;
      if(q && !((o.n||'').toLowerCase().includes(q) || (o.a||'').toLowerCase().includes(q) || (o.t||'').toLowerCase().includes(q))) return false;
      return true;
    });
    currentFiltered.forEach(o=>{
      const m = markers[o.id];
      m.setIcon(outletIcon());
      m.setPopupContent(popupHtml(o));
      clusterGroup.addLayer(m);
    });
    document.getElementById('countBadge').textContent = currentFiltered.length + ' outlet';
  }
  renderList();
  updateRouteFab();
}

/* ============ Distance & bottom sheet list ============ */
let userLatLng = null;
function haversine(lat1,lon1,lat2,lon2){
  const R=6371, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function renderList(){
  const sheetList = document.getElementById('sheetList');
  const emptyState = document.getElementById('emptyState');
  const sheetLabel = document.getElementById('sheetLabel');
  const sheetSub = document.getElementById('sheetSub');

  let list = currentFiltered.slice();
  if(userLatLng){
    list.forEach(o=> o._dist = haversine(userLatLng.lat, userLatLng.lng, o.lat, o.lon));
    list.sort((a,b)=>a._dist-b._dist);
    sheetSub.textContent = 'Diurutkan berdasarkan jarak terdekat';
  } else {
    sheetSub.textContent = 'Aktifkan GPS untuk urutkan berdasarkan jarak';
  }
  sheetLabel.textContent = list.length + ' outlet ditemukan';

  if(list.length===0){
    sheetList.innerHTML=''; emptyState.style.display='block';
    return;
  }
  emptyState.style.display='none';

  const frag = document.createDocumentFragment();
  list.slice(0,300).forEach((o,idx)=>{
    const row = document.createElement('div');
    row.className='outlet-row';
    const distTxt = o._dist!=null ? (o._dist<1 ? Math.round(o._dist*1000)+' m' : o._dist.toFixed(1)+' km') : '';
    const metaExtra = o._vehicleId ? (' · Mobil '+o._vehicleId+(o._invoice?' · '+fmtRp(o._invoice):'')) : (o.p?' · '+escapeHtml(o.p):'');
    row.innerHTML = '<div class="outlet-idx">'+(idx+1)+'</div>'
      +'<div class="outlet-info"><div class="outlet-name">'+escapeHtml(o.n)+'</div>'
      +'<div class="outlet-meta">'+escapeHtml(o.t)+' · '+escapeHtml(o.s||'-')+metaExtra+'</div></div>'
      +(distTxt?'<div class="outlet-dist">'+distTxt+'</div>':'')
      +'<a class="outlet-go" href="'+gmapsUrl(o.lat,o.lon)+'" target="_blank" rel="noopener" title="Navigasi">'
      +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2l9 20-9-6-9 6 9-20z" fill="#fff"/></svg></a>';
    row.addEventListener('click', (e)=>{
      if(e.target.closest('.outlet-go')) return;
      map.flyTo([o.lat,o.lon], 16, {duration:0.6});
      setTimeout(()=>markers[o.id].openPopup(), 650);
      closeSheet();
    });
    frag.appendChild(row);
  });
  sheetList.innerHTML='';
  sheetList.appendChild(frag);
}

/* ============ Bottom sheet drag/toggle ============ */
let sheet, sheetHandle, sheetChevron, sheetOpen = false;
function setupSheet(){
  sheet = document.getElementById('sheet');
  sheetHandle = document.getElementById('sheetHandle');
  sheetChevron = document.getElementById('sheetChevron');
  sheetHandle.addEventListener('click', ()=> sheetOpen ? closeSheet() : openSheet());
  let dragStartY=null;
  sheetHandle.addEventListener('touchstart', e=>{ dragStartY=e.touches[0].clientY; }, {passive:true});
  sheetHandle.addEventListener('touchmove', e=>{
    if(dragStartY===null) return;
    const dy = e.touches[0].clientY - dragStartY;
    if(dy < -40) { openSheet(); dragStartY=null; }
    else if(dy > 40) { closeSheet(); dragStartY=null; }
  }, {passive:true});
  sheetHandle.addEventListener('touchend', ()=>{ dragStartY=null; });
}
function openSheet(){ sheet.classList.add('open'); sheetOpen=true; sheetChevron.style.transform='rotate(180deg)'; }
function closeSheet(){ sheet.classList.remove('open'); sheetOpen=false; sheetChevron.style.transform='rotate(0deg)'; }

/* ============ Live GPS ============ */
let liveMarker = null, following = true, firstFix = true;
function ensureLiveMarker(latlng){
  const icon = L.divIcon({className:'', html:'<div class="live-marker"><div class="pulse"></div><div class="core"></div></div>', iconSize:[22,22], iconAnchor:[11,11]});
  if(!liveMarker){
    liveMarker = L.marker(latlng, {icon, zIndexOffset:1000}).addTo(map);
  } else {
    liveMarker.setLatLng(latlng);
  }
}
function setupGPS(){
  const gpsStatus = document.getElementById('gpsStatus');
  const gpsText = document.getElementById('gpsText');
  const locateBtn = document.getElementById('locateBtn');
  locateBtn.classList.add('following');

  if(!('geolocation' in navigator)){
    gpsStatus.className=''; gpsText.textContent='GPS tidak didukung';
    showToast('Perangkat ini tidak mendukung GPS.');
  } else {
    gpsStatus.className='wait'; gpsText.textContent='Mencari GPS…';
    navigator.geolocation.watchPosition(pos=>{
      const {latitude, longitude, accuracy} = pos.coords;
      userLatLng = {lat:latitude, lng:longitude};
      ensureLiveMarker([latitude, longitude]);
      gpsStatus.className='ok';
      gpsText.textContent = 'Live · akurasi ' + Math.round(accuracy) + 'm';
      if(following || firstFix){
        map.setView([latitude, longitude], firstFix ? 14 : map.getZoom(), {animate:true});
      }
      if(firstFix){ firstFix=false; }
      renderList();
    }, err=>{
      gpsStatus.className='';
      if(err.code===1) gpsText.textContent='Izin lokasi ditolak';
      else gpsText.textContent='GPS tidak tersedia';
      if(err.code===1) showToast('Izinkan akses lokasi di browser agar posisi Anda tampil live di peta.');
    }, {enableHighAccuracy:true, maximumAge:2000, timeout:15000});
  }

  locateBtn.addEventListener('click', ()=>{
    following = !following;
    locateBtn.classList.toggle('following', following);
    if(following && userLatLng){
      map.setView([userLatLng.lat, userLatLng.lng], Math.max(map.getZoom(),15), {animate:true});
    }
  });
  map.on('dragstart', ()=>{ if(following){ following=false; locateBtn.classList.remove('following'); } });
}

/* ============ Route: multi-stop Google Maps per vehicle ============ */
function nearestNeighborOrder(list){
  if(list.length<=1) return list.slice();
  const remaining = list.slice();
  const ordered = [remaining.shift()];
  while(remaining.length){
    const last = ordered[ordered.length-1];
    let bestIdx=0, bestDist=Infinity;
    remaining.forEach((o,i)=>{
      const d = haversine(last.lat,last.lon,o.lat,o.lon);
      if(d<bestDist){ bestDist=d; bestIdx=i; }
    });
    ordered.push(remaining.splice(bestIdx,1)[0]);
  }
  return ordered;
}
function computeRouteChunks(vehicleId){
  if(!RENCANA) return [];
  const v = RENCANA.vehicles.find(v=>v.id===vehicleId);
  if(!v) return [];
  const resolved = v.stops.map(s=>outletByCc[s.cc]).filter(Boolean);
  const ordered = nearestNeighborOrder(resolved);
  const chunks = [];
  for(let i=0;i<ordered.length;i+=10){
    chunks.push(ordered.slice(i,i+10));
  }
  return chunks.map(chunk=>{
    const dest = chunk[chunk.length-1];
    const waypoints = chunk.slice(0,-1).map(o=>o.lat+','+o.lon).join('|');
    let url = 'https://www.google.com/maps/dir/?api=1&destination='+dest.lat+','+dest.lon+'&travelmode=driving';
    if(waypoints) url += '&waypoints='+encodeURIComponent(waypoints);
    return url;
  });
}
function setupRouteFab(){
  document.getElementById('routeFab').addEventListener('click', ()=>{
    if(!routeChunks.length) return;
    window.open(routeChunks[routeChunkIndex], '_blank');
    routeChunkIndex = (routeChunkIndex+1) % routeChunks.length;
    updateRouteFabLabel();
  });
}
function updateRouteFab(){
  const fab = document.getElementById('routeFab');
  if(currentMode==='plan' && currentVehicle!=='all' && RENCANA){
    routeChunks = computeRouteChunks(Number(currentVehicle));
    routeChunkIndex = 0;
    if(routeChunks.length){
      fab.classList.add('show');
      updateRouteFabLabel();
    } else {
      fab.classList.remove('show');
    }
  } else {
    fab.classList.remove('show');
    routeChunks = [];
  }
}
function updateRouteFabLabel(){
  const label = document.getElementById('routeFabText');
  if(routeChunks.length<=1) label.textContent = 'Buka Rute Mobil '+currentVehicle+' di Google Maps';
  else label.textContent = 'Buka Rute Mobil '+currentVehicle+' — Bagian '+(routeChunkIndex+1)+'/'+routeChunks.length;
}

/* ============ Toast ============ */
let toastTimer=null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3600);
}

/* ============ Go ============ */
boot();
